<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#c0392b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ねぶたマップ" />
  <title>🏮 青森ねぶたマップ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --nebuta-red: #c0392b;
      --nebuta-orange: #e67e22;
      --nebuta-gold: #f39c12;
      --nebuta-dark: #1a0a00;
      --nebuta-panel: rgba(26, 10, 0, 0.92);
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--nebuta-dark);
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(180deg, #c0392b 0%, #1a0a00 100%);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      z-index: 1000;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      flex: 1;
    }

    header .count-badge {
      background: var(--nebuta-gold);
      color: var(--nebuta-dark);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 12px;
    }

    /* 地図 */
    #map {
      flex: 1;
      width: 100%;
      background: #1a0a00;
    }

    /* 現在地ボタン */
    .locate-btn {
      position: absolute;
      bottom: 20px;
      right: 16px;
      z-index: 900;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--nebuta-red);
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
    }
    .locate-btn:active { transform: scale(0.92); background: #8b0000; }

    /* スポット詳細パネル */
    .spot-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 950;
      background: var(--nebuta-panel);
      border-radius: 20px 20px 0 0;
      padding: 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
      max-height: 75dvh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      border-top: 2px solid var(--nebuta-red);
    }

    .spot-panel.open {
      transform: translateY(0);
    }

    .panel-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 12px 20px 8px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .panel-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      color: #fff;
    }

    .panel-close {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: -2px;
    }

    .panel-photo-count {
      font-size: 12px;
      color: var(--nebuta-gold);
      padding: 0 20px 8px;
      flex-shrink: 0;
    }

    /* 写真スワイプエリア */
    .photos-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      gap: 10px;
      padding: 0 20px 16px;
      flex-shrink: 0;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .photos-scroll::-webkit-scrollbar { display: none; }

    .photo-item {
      scroll-snap-align: start;
      flex-shrink: 0;
      width: calc(100vw - 56px);
      max-width: 340px;
      height: 200px;
      border-radius: 12px;
      overflow: hidden;
      background: #333;
      position: relative;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-item .photo-num {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .no-photo {
      width: calc(100vw - 56px);
      max-width: 340px;
      height: 200px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      flex-shrink: 0;
    }

    /* マップ情報パネル下部 */
    .panel-info {
      padding: 0 20px 20px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .navi-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--nebuta-red), var(--nebuta-orange));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      margin-top: 4px;
    }

    /* カスタムマーカー */
    .nebuta-marker {
      width: 36px;
      height: 36px;
      background: var(--nebuta-red);
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .nebuta-marker-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(45deg);
      font-size: 16px;
    }

    .nebuta-marker.active {
      background: var(--nebuta-gold);
      transform: rotate(-45deg) scale(1.2);
    }

    /* リストビュー */
    .list-btn {
      position: absolute;
      bottom: 80px;
      right: 16px;
      z-index: 900;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(26, 10, 0, 0.9);
      color: white;
      border: 2px solid var(--nebuta-gold);
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .list-btn:active { transform: scale(0.92); }

    /* スポットリストパネル */
    .list-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 960;
      background: var(--nebuta-panel);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
      max-height: 80dvh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      border-top: 2px solid var(--nebuta-gold);
    }

    .list-panel.open {
      transform: translateY(0);
    }

    .list-panel-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .list-panel-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--nebuta-gold);
    }

    .list-scroll {
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      cursor: pointer;
      transition: background 0.15s;
    }
    .list-item:active { background: rgba(255,255,255,0.08); }

    .list-thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .list-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .list-item-info { flex: 1; min-width: 0; }
    .list-item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

    .list-item-arrow { color: rgba(255,255,255,0.3); font-size: 14px; flex-shrink: 0; }

    /* オーバーレイ */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 940;
      background: transparent;
      display: none;
    }
    .overlay.active { display: block; }

    /* Leafletポップアップ上書き */
    .leaflet-popup-content-wrapper {
      background: var(--nebuta-dark) !important;
      border: 1px solid var(--nebuta-red) !important;
      border-radius: 10px !important;
      color: white !important;
    }
    .leaflet-popup-tip { background: var(--nebuta-dark) !important; }
    .leaflet-popup-content { font-size: 13px; font-weight: 600; margin: 8px 12px !important; }
  </style>
</head>
<body>

<header>
  <h1>青森ねぶたマップ</h1>
</header>

<div id="map"></div>

<!-- 現在地ボタン -->
<button class="locate-btn" onclick="locateMe()" title="現在地">📍</button>

<!-- リストボタン -->
<button class="list-btn" onclick="toggleList()" title="一覧">☰</button>

<!-- オーバーレイ -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- スポット詳細パネル -->
<div class="spot-panel" id="spotPanel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div class="panel-title" id="panelTitle">スポット名</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-photo-count" id="panelPhotoCount"></div>
  <div class="photos-scroll" id="photosScroll"></div>
  <div class="panel-info">
    <a class="navi-btn" id="naviBtn" href="#" target="_blank">
      🗺 Googleマップでナビ
    </a>
  </div>
</div>

<!-- スポット一覧パネル -->
<div class="list-panel" id="listPanel">
  <div class="list-panel-header">
    <span class="list-panel-title">📋 全スポット一覧（20件）</span>
    <button class="panel-close" onclick="toggleList()">✕</button>
  </div>
  <div class="list-scroll" id="listScroll"></div>
</div>

<script>
const SPOTS = [
  {"name": "新青森駅", "lat": 40.8281932, "lon": 140.6934715, "images": ["imgs/shin-aomori-station-0.jpg", "imgs/shin-aomori-station-1.jpg", "imgs/shin-aomori-station-2.jpg", "imgs/shin-aomori-station-3.jpg", "imgs/shin-aomori-station-4.jpg", "imgs/shin-aomori-station-5.jpg"]},
  {"name": "青森空港", "lat": 40.7354587, "lon": 140.6904126, "images": ["imgs/aomori-airport-0.jpg"]},
  {"name": "貝焼酒場 樹", "lat": 40.601679, "lon": 140.4713438, "images": ["imgs/kaiyaki-sakaba-ki-0.jpg"]},
  {"name": "サンロード青森", "lat": 40.8070722, "lon": 140.7533, "images": ["imgs/sunroad-aomori-0.jpg"]},
  {"name": "青森まちなかおんせん", "lat": 40.824661, "lon": 140.7353734, "images": ["imgs/aomori-machinaka-onsen-0.jpg", "imgs/aomori-machinaka-onsen-1.jpg"]},
  {"name": "東奥日報新町ビル New'sホール", "lat": 40.8257181, "lon": 140.7405285, "images": ["imgs/tohoku-nippo-news-hall-0.jpg", "imgs/tohoku-nippo-news-hall-1.jpg"]},
  {"name": "青森競輪場", "lat": 40.7971385, "lon": 140.6645416, "images": ["imgs/aomori-keirin-0.jpg", "imgs/aomori-keirin-1.jpg", "imgs/aomori-keirin-2.jpg"]},
  {"name": "天然温泉 淡雪の湯 ドーミーイン青森", "lat": 40.8260454, "lon": 140.7417244, "images": ["imgs/dormy-inn-aomori-0.jpg", "imgs/dormy-inn-aomori-1.jpg", "imgs/dormy-inn-aomori-2.jpg", "imgs/dormy-inn-aomori-3.jpg", "imgs/dormy-inn-aomori-4.jpg", "imgs/dormy-inn-aomori-5.jpg"]},
  {"name": "ホテル青森", "lat": 40.8253693, "lon": 140.7551059, "images": ["imgs/hotel-aomori-0.jpg", "imgs/hotel-aomori-1.jpg"]},
  {"name": "病厄除守護神 廣田神社", "lat": 40.822581, "lon": 140.742681, "images": ["imgs/hirota-shrine-0.jpg", "imgs/hirota-shrine-1.jpg"]},
  {"name": "お食事処 おさない", "lat": 40.8279769, "lon": 140.7359841, "images": ["imgs/restaurant-osanai-0.jpg"]},
  {"name": "津軽じょっぱり漁屋酒場 青森本町店", "lat": 40.8256843, "lon": 140.7467049, "images": ["imgs/tsugaru-joppari-0.jpg", "imgs/tsugaru-joppari-1.jpg"]},
  {"name": "㈱番地銘石 本店", "lat": 40.8241554, "lon": 140.7555503, "images": ["imgs/banchi-meiseki-0.jpg"]},
  {"name": "弘前駅", "lat": 40.5991512, "lon": 140.4852197, "images": ["imgs/hirosaki-station-0.jpg", "imgs/hirosaki-station-1.jpg"]},
  {"name": "イオンモールつがる柏", "lat": 40.8020367, "lon": 140.4168295, "images": ["imgs/aeon-mall-tsugaru-0.jpg", "imgs/aeon-mall-tsugaru-1.jpg", "imgs/aeon-mall-tsugaru-2.jpg", "imgs/aeon-mall-tsugaru-3.jpg"]},
  {"name": "NTT青森支店前", "lat": 40.823571, "lon": 140.7513679, "images": ["imgs/ntt-aomori-0.jpg", "imgs/ntt-aomori-1.jpg", "imgs/ntt-aomori-2.jpg"]},
  {"name": "協同組合タッケン", "lat": 40.8216192, "lon": 140.7506387, "images": ["imgs/takken-0.jpg", "imgs/takken-1.jpg"]},
  {"name": "ふく郎", "lat": 40.8280501, "lon": 140.740048, "images": ["imgs/fukuro-0.jpg", "imgs/fukuro-1.jpg", "imgs/fukuro-2.jpg", "imgs/fukuro-3.jpg", "imgs/fukuro-4.jpg"]},
  {"name": "ペットショップCoo&RIKU 青森店", "lat": 40.8015832, "lon": 140.757408, "images": ["imgs/coo-riku-aomori-0.jpg", "imgs/coo-riku-aomori-1.jpg"]},
  {"name": "スーパーホテル青森", "lat": 40.823651, "lon": 140.7506941, "images": ["imgs/super-hotel-aomori-0.jpg"]}
];

// 地図初期化
const map = L.map('map', {
  center: [40.8228, 140.7507],
  zoom: 15,
  zoomControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

// ズームコントロールを左下に
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// マーカー作成
let activeMarker = null;

function createMarkerIcon(spot, active = false) {
  const img = spot.images.length > 0
    ? `<img src="${spot.images[0]}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.outerHTML='<span style=\\'font-size:18px;\\'>🏮</span>'">`
    : '<span style="font-size:18px;">🏮</span>';
  const size = active ? 52 : 44;
  const borderColor = active ? '#f39c12' : '#c0392b';
  const boxShadow = active
    ? '0 0 0 3px rgba(243,156,18,0.5), 0 4px 14px rgba(0,0,0,0.6)'
    : '0 3px 8px rgba(0,0,0,0.45)';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;
      border-radius:50% 50% 50% 4px;
      transform:rotate(-45deg);
      border:3px solid ${borderColor};
      box-shadow:${boxShadow};
      background:#333;
      overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    "><div style="transform:rotate(45deg);width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;overflow:hidden;">${img}</div></div>`,
    iconSize: [size, size],
    iconAnchor: [size * 0.28, size],
    popupAnchor: [size * 0.22, -(size + 4)]
  });
}

const markers = SPOTS.map((spot, i) => {
  const marker = L.marker([spot.lat, spot.lon], {
    icon: createMarkerIcon(spot, false)
  }).addTo(map);

  marker.on('click', () => openSpot(spot, marker));
  return marker;
});

// スポットパネルを開く
function openSpot(spot, marker) {
  // マーカーをアクティブに
  if (activeMarker && activeMarker._spot) {
    activeMarker.setIcon(createMarkerIcon(activeMarker._spot, false));
  }
  marker._spot = spot;
  marker.setIcon(createMarkerIcon(spot, true));
  activeMarker = marker;

  // パネルを更新
  document.getElementById('panelTitle').textContent = spot.name;
  document.getElementById('panelPhotoCount').textContent =
    spot.images.length > 0 ? `📷 ${spot.images.length}枚の写真` : '';

  // 写真
  const scroll = document.getElementById('photosScroll');
  scroll.innerHTML = '';
  if (spot.images.length > 0) {
    spot.images.forEach((url, idx) => {
      const div = document.createElement('div');
      div.className = 'photo-item';
      div.innerHTML = `<img src="${url}" onerror="this.parentNode.innerHTML='<span style=\'font-size:48px;display:flex;align-items:center;justify-content:center;height:100%\'>🏮</span>'">
        ${spot.images.length > 1 ? `<span class="photo-num">${idx+1}/${spot.images.length}</span>` : ''}`;
      scroll.appendChild(div);
    });
  } else {
    scroll.innerHTML = '<div class="no-photo">🏮</div>';
  }
  scroll.scrollLeft = 0;

  // ナビボタン
  document.getElementById('naviBtn').href =
    `https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lon}`;

  // パネルを表示
  document.getElementById('spotPanel').classList.add('open');
  document.getElementById('overlay').classList.add('active');

  // 地図を中央に
  map.panTo([spot.lat, spot.lon], { animate: true });
}

function closePanel() {
  document.getElementById('spotPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
  if (activeMarker) {
    activeMarker.setIcon(createMarkerIcon(activeMarker._spot || {images:[]}, false));
    activeMarker = null;
  }
}

// リスト
let listOpen = false;
function toggleList() {
  listOpen = !listOpen;
  document.getElementById('listPanel').classList.toggle('open', listOpen);
  document.getElementById('overlay').classList.toggle('active', listOpen);
}

// リスト初期化
const listScroll = document.getElementById('listScroll');
SPOTS.forEach((spot, i) => {
  const div = document.createElement('div');
  div.className = 'list-item';
  const thumb = spot.images.length > 0
    ? `<img src="${spot.images[0]}" onerror="this.outerHTML='🏮'">`
    : '🏮';
  div.innerHTML = `
    <div class="list-thumb">${thumb}</div>
    <div class="list-item-info">
      <div class="list-item-name">${spot.name}</div>
      <div class="list-item-sub">📷 ${spot.images.length}枚</div>
    </div>
    <div class="list-item-arrow">›</div>
  `;
  div.addEventListener('click', () => {
    toggleList();
    setTimeout(() => {
      openSpot(spot, markers[i]);
      map.setView([spot.lat, spot.lon], 15, { animate: true });
    }, 300);
  });
  listScroll.appendChild(div);
});

// オーバーレイクリックで閉じる
function closeAll() {
  if (listOpen) { toggleList(); return; }
  closePanel();
}

// 現在地
function locateMe() {
  map.locate({ setView: true, maxZoom: 15 });
}
map.on('locationfound', (e) => {
  L.circleMarker(e.latlng, {
    radius: 10,
    fillColor: '#3498db',
    color: '#fff',
    weight: 3,
    fillOpacity: 0.9
  }).addTo(map).bindPopup('現在地').openPopup();
});
map.on('locationerror', () => {
  alert('位置情報を取得できませんでした');
});
</script>
</body>
</html>
